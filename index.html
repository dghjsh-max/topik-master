<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOPIK Master - 30 Days Challenge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .tab-active { border-bottom: 3px solid #3b82f6; color: #3b82f6; font-weight: 700; }
        .hidden { display: none; }
        .correct { background-color: #dcfce7; border-color: #22c55e; }
        .incorrect { background-color: #fee2e2; border-color: #ef4444; }
        .day-card-active { border: 2px solid #3b82f6; background-color: #eff6ff; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-30">
        <div class="max-w-2xl mx-auto px-4 py-4 flex justify-between items-center">
            <button onclick="switchTab('home')" class="text-xl font-bold text-blue-600 flex items-center">
                <i class="fas fa-graduation-cap mr-2"></i>TOPIK 30일 완성
            </button>
            <div id="user-progress-badge" class="text-[10px] px-3 py-1 bg-blue-100 text-blue-600 rounded-full font-bold">DAY 1</div>
        </div>
        <nav class="flex border-t max-w-2xl mx-auto">
            <button onclick="switchTab('home')" id="tab-home" class="flex-1 px-4 py-3 text-center tab-active transition-all">커리큘럼</button>
            <button onclick="switchTab('quiz')" id="tab-quiz" class="flex-1 px-4 py-3 text-center text-gray-500 transition-all">오늘의 퀴즈</button>
            <button onclick="switchTab('vocab')" id="tab-vocab" class="flex-1 px-4 py-3 text-center text-gray-500 transition-all">오늘의 단어</button>
            <button onclick="switchTab('record')" id="tab-record" class="flex-1 px-4 py-3 text-center text-gray-500 transition-all">기록</button>
        </nav>
    </header>

    <main class="max-w-2xl mx-auto px-4 mt-6">
        
        <!-- HOME / CURRICULUM SECTION -->
        <section id="section-home" class="animate-fade-in space-y-4">
            <div class="bg-gradient-to-br from-blue-600 to-indigo-700 p-8 rounded-3xl text-white shadow-lg mb-6">
                <h2 class="text-2xl font-bold mb-2">30일 집중 챌린지</h2>
                <p class="text-blue-100 text-sm mb-4">매일 10분, TOPIK 합격을 위한 필수 데이터셋 학습</p>
                <div class="w-full bg-white/20 h-2 rounded-full overflow-hidden">
                    <div id="total-progress-bar" class="bg-white h-full transition-all" style="width: 0%"></div>
                </div>
                <p class="text-xs mt-2 text-right opacity-80" id="progress-text">진행률: 0% (0/30)</p>
            </div>

            <h3 class="font-bold text-gray-800 ml-1">학습 로드맵</h3>
            <div id="day-grid" class="grid grid-cols-5 gap-3">
                <!-- Days 1-30 will be generated here -->
            </div>
        </section>

        <!-- QUIZ SECTION -->
        <section id="section-quiz" class="hidden animate-fade-in">
            <div id="quiz-ui" class="space-y-6">
                <div class="flex justify-between items-center text-sm font-bold text-gray-400">
                    <span>DAY <span id="quiz-day-label">1</span> 퀴즈</span>
                    <span id="quiz-progress-label">1 / 10</span>
                </div>
                <div id="quiz-card" class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
                    <div id="quiz-type-tag" class="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-4">VOCABULARY</div>
                    <h3 id="quiz-question" class="text-xl font-medium text-gray-800 leading-relaxed mb-10 min-h-[80px]"></h3>
                    <div id="quiz-options" class="grid gap-3"></div>
                    
                    <div id="quiz-explanation" class="mt-8 p-5 bg-blue-50 rounded-2xl border border-blue-100 hidden">
                        <p id="explanation-text" class="text-sm text-blue-800 leading-relaxed"></p>
                    </div>
                    
                    <button id="next-quiz-btn" onclick="nextQuestion()" class="w-full mt-8 py-4 bg-blue-600 text-white rounded-2xl font-bold hidden hover:bg-blue-700 shadow-lg shadow-blue-100">다음 문제</button>
                </div>
            </div>
            
            <div id="quiz-result" class="hidden bg-white p-12 rounded-3xl shadow-sm border text-center animate-fade-in">
                <div class="text-5xl font-black text-blue-600 mb-4" id="final-score">0 / 10</div>
                <h2 class="text-2xl font-bold mb-2">학습 완료!</h2>
                <p class="text-gray-500 mb-8">오늘의 학습 목표를 달성하셨습니다.</p>
                <button onclick="switchTab('home')" class="w-full py-4 bg-gray-100 text-gray-700 rounded-2xl font-bold hover:bg-gray-200">커리큘럼으로 돌아가기</button>
            </div>
        </section>

        <!-- VOCAB SECTION -->
        <section id="section-vocab" class="hidden animate-fade-in">
            <div class="bg-white p-6 rounded-3xl shadow-sm border mb-6 flex justify-between items-center">
                <h2 class="text-xl font-bold text-gray-800">DAY <span id="vocab-day-label">1</span> 필수 어휘</h2>
                <div class="flex bg-gray-100 p-1 rounded-lg">
                    <button onclick="setLanguage('en')" id="lang-en" class="px-3 py-1 text-xs font-bold rounded lang-btn-active">EN</button>
                    <button onclick="setLanguage('cn')" id="lang-cn" class="px-3 py-1 text-xs font-bold rounded text-gray-400">CN</button>
                </div>
            </div>
            <div id="vocab-list" class="space-y-4"></div>
        </section>

        <!-- RECORD SECTION -->
        <section id="section-record" class="hidden animate-fade-in">
            <div class="bg-white p-6 rounded-3xl shadow-sm border mb-6">
                <h2 class="text-xl font-bold text-gray-800 mb-4">나의 학습 기록</h2>
                <div id="records-container" class="space-y-3"></div>
            </div>
        </section>
    </main>

    <script>
        // --- 30일 커리큘럼 데이터 구축 (초기 샘플 포함) ---
        // 실제 운영 시 300개의 데이터셋이 들어가는 부분입니다.
        const STUDY_DATA = {
            1: {
                title: "기본 조사와 인사",
                quizzes: [
                    { q: "저는 한국어(   ) 공부합니다.", options: ["를", "가", "는", "에"], answer: 0, type: "문법", exp: "목적격 조사: -(을/를)" },
                    { q: "어제 시장(   ) 갔습니다.", options: ["에", "에서", "를", "가"], answer: 0, type: "문법", exp: "장소의 방향 조사: -에" },
                    { q: "이것(   ) 사과입니까?", options: ["은", "이", "을", "가"], answer: 1, exp: "주격 조사: -이/가 (받침 있음)" },
                    { q: "밥(   ) 먹었습니다.", options: ["을", "를", "가", "에"], answer: 0, type: "문법", exp: "목적격 조사: -을" },
                    { q: "학교(   ) 친구를 만나요.", options: ["에서", "에", "로", "부터"], answer: 0, type: "문법", exp: "장소에서의 행위: -에서" },
                    { q: "저는 학생(   ).", options: ["입니다", "입니까", "이에요", "해요"], answer: 0, type: "문법", exp: "단정적 종결어미: -입니다" },
                    { q: "오늘 날씨가 (   ).", options: ["좋아요", "좋습니까", "좋아요?", "좋아서"], answer: 0, type: "어휘", exp: "형용사 현재형: 좋다 -> 좋아요" },
                    { q: "동생(   ) 수영을 해요.", options: ["하고", "랑", "이랑", "와"], answer: 1, exp: "동반/나열: -랑 (받침 없음)" },
                    { q: "어디(   ) 삽니까?", options: ["에", "에서", "를", "가"], answer: 0, type: "문법", exp: "존재의 장소: -에 살다" },
                    { q: "친구(   ) 전화를 했어요.", options: ["에게", "한테", "께", "서"], answer: 0, type: "문법", exp: "대상을 나타내는 조사: -에게" }
                ],
                vocabs: [
                    { word: "공부하다", pos: "동사", meanEn: "To study", meanCn: "学习", ex: "매일 한국어를 공부해요." },
                    { word: "친구", pos: "명사", meanEn: "Friend", meanCn: "朋友", ex: "친구를 만나요." },
                    { word: "시장", pos: "명사", meanEn: "Market", meanCn: "市场", ex: "시장에 가요." },
                    { word: "날씨", pos: "명사", meanEn: "Weather", meanCn: "天气", ex: "오늘 날씨가 좋아요." },
                    { word: "전화", pos: "명사", meanEn: "Phone/Call", meanCn: "电话", ex: "전화를 해요." }
                ]
            },
            2: {
                title: "숫자와 시간",
                quizzes: Array(10).fill({ q: "Day 2 샘플 퀴즈입니다 (데이터 구축 중)", options: ["1", "2", "3", "4"], answer: 0, type: "문법", exp: "설명" }),
                vocabs: Array(5).fill({ word: "시", pos: "명사", meanEn: "Hour", meanCn: "时", ex: "지금은 세 시예요." })
            }
            // ... Day 3부터 Day 30까지 데이터를 반복 확장하여 채워넣습니다.
        };

        // Day 3 ~ 30 데이터 자동 생성 (실제 데이터 입력 전 기틀 마련)
        for (let d = 3; d <= 30; d++) {
            STUDY_DATA[d] = {
                title: `Day ${d} 학습 주제`,
                quizzes: Array(10).fill(0).map((_, i) => ({
                    q: `Day ${d}의 실전 연습 ${i+1}번 문제입니다.`,
                    options: ["정답", "오답1", "오답2", "오답3"],
                    answer: 0,
                    type: "실전",
                    exp: "해당 일차의 문법 및 어휘 해설입니다."
                })),
                vocabs: Array(5).fill({ word: `단어 ${d}`, pos: "명사", meanEn: "Vocabulary", meanCn: "词汇", ex: "예문입니다." })
            };
        }

        let currentDay = 1;
        let currentQuizIdx = 0;
        let quizScore = 0;
        let isAnswered = false;
        let currentLang = 'en';

        window.onload = () => {
            loadProgress();
            renderCurriculum();
            switchTab('home');
        };

        function loadProgress() {
            const savedDay = localStorage.getItem('topik_current_day');
            if (savedDay) currentDay = parseInt(savedDay);
            updateProgressUI();
        }

        function updateProgressUI() {
            const completed = currentDay - 1;
            const percentage = Math.min((completed / 30) * 100, 100);
            document.getElementById('total-progress-bar').style.width = `${percentage}%`;
            document.getElementById('progress-text').innerText = `진행률: ${Math.round(percentage)}% (${completed}/30)`;
            document.getElementById('user-progress-badge').innerText = `DAY ${currentDay}`;
        }

        function renderCurriculum() {
            const grid = document.getElementById('day-grid');
            grid.innerHTML = '';
            for (let i = 1; i <= 30; i++) {
                const card = document.createElement('button');
                const isLocked = i > currentDay;
                const isDone = i < currentDay;
                
                card.className = `p-4 h-24 rounded-2xl border flex flex-col items-center justify-center transition-all ${isLocked ? 'bg-gray-50 text-gray-300' : 'bg-white shadow-sm hover:shadow-md'}`;
                if (i === currentDay) card.classList.add('day-card-active');
                
                card.innerHTML = `
                    <span class="text-xs font-bold mb-1">${i}</span>
                    <i class="fas ${isDone ? 'fa-check-circle text-green-500' : isLocked ? 'fa-lock' : 'fa-play text-blue-500'}"></i>
                `;
                
                card.onclick = () => {
                    if (i <= currentDay) {
                        startDay(i);
                    }
                };
                grid.appendChild(card);
            }
        }

        function startDay(day) {
            currentDay = day;
            currentQuizIdx = 0;
            quizScore = 0;
            switchTab('quiz');
        }

        function switchTab(tab) {
            ['home', 'quiz', 'vocab', 'record'].forEach(t => {
                document.getElementById(`section-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).className = "flex-1 px-4 py-3 text-center text-gray-500 transition-all";
            });
            document.getElementById(`section-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).className = "flex-1 px-4 py-3 text-center tab-active transition-all";

            if (tab === 'quiz') initQuiz();
            if (tab === 'vocab') renderVocab();
            if (tab === 'record') renderRecords();
            updateProgressUI();
        }

        // --- QUIZ LOGIC ---
        function initQuiz() {
            document.getElementById('quiz-day-label').innerText = currentDay;
            document.getElementById('quiz-ui').classList.remove('hidden');
            document.getElementById('quiz-result').classList.add('hidden');
            loadQuestion();
        }

        function loadQuestion() {
            isAnswered = false;
            const data = STUDY_DATA[currentDay].quizzes[currentQuizIdx];
            document.getElementById('quiz-progress-label').innerText = `${currentQuizIdx + 1} / 10`;
            document.getElementById('quiz-type-tag').innerText = data.type;
            document.getElementById('quiz-question').innerText = data.q;
            document.getElementById('quiz-explanation').classList.add('hidden');
            document.getElementById('next-quiz-btn').classList.add('hidden');

            const container = document.getElementById('quiz-options');
            container.innerHTML = '';
            data.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 rounded-2xl border-2 border-gray-50 bg-white hover:border-blue-100 transition-all flex items-center group";
                btn.innerHTML = `
                    <div class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center font-bold mr-4 text-xs text-gray-400 group-hover:text-blue-500 transition-colors">${idx + 1}</div>
                    <span class="text-sm font-medium text-gray-700">${opt}</span>
                `;
                btn.onclick = () => checkAnswer(idx, data.answer, data.exp, btn);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selected, correct, exp, btn) {
            if (isAnswered) return;
            isAnswered = true;
            const allBtns = document.getElementById('quiz-options').children;
            
            if (selected === correct) {
                btn.classList.add('correct');
                quizScore++;
            } else {
                btn.classList.add('incorrect');
                allBtns[correct].classList.add('correct');
            }

            document.getElementById('explanation-text').innerText = exp;
            document.getElementById('quiz-explanation').classList.remove('hidden');
            document.getElementById('next-quiz-btn').classList.remove('hidden');
        }

        function nextQuestion() {
            currentQuizIdx++;
            if (currentQuizIdx < 10) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quiz-ui').classList.add('hidden');
            document.getElementById('quiz-result').classList.remove('hidden');
            document.getElementById('final-score').innerText = `${quizScore} / 10`;
            
            if (quizScore >= 7) { // 7점 이상일 때만 다음 날짜 잠금 해제
                if (currentDay === parseInt(localStorage.getItem('topik_current_day') || 1)) {
                    currentDay++;
                    localStorage.setItem('topik_current_day', currentDay);
                }
            }
            saveRecord(quizScore);
        }

        // --- VOCAB LOGIC ---
        function renderVocab() {
            document.getElementById('vocab-day-label').innerText = currentDay;
            const list = document.getElementById('vocab-list');
            list.innerHTML = STUDY_DATA[currentDay].vocabs.map((v, i) => `
                <div class="bg-white p-5 rounded-3xl border border-gray-50 shadow-sm animate-fade-in" style="animation-delay: ${i * 0.1}s">
                    <div class="flex justify-between items-start mb-2">
                        <h4 class="font-bold text-lg text-gray-800">${v.word}</h4>
                        <span class="text-[10px] px-2 py-0.5 bg-blue-50 text-blue-600 rounded-full font-bold uppercase">${v.pos}</span>
                    </div>
                    <p class="text-blue-600 font-medium text-sm mb-3">${currentLang === 'en' ? v.meanEn : v.meanCn}</p>
                    <div class="text-xs text-gray-400 bg-gray-50 p-3 rounded-2xl italic flex">
                        <i class="fas fa-quote-left mr-2 opacity-30"></i>
                        <span>${v.ex}</span>
                    </div>
                </div>
            `).join('');
        }

        function setLanguage(l) {
            currentLang = l;
            document.getElementById('lang-en').className = l === 'en' ? 'px-3 py-1 text-xs font-bold rounded lang-btn-active' : 'px-3 py-1 text-xs font-bold rounded text-gray-400';
            document.getElementById('lang-cn').className = l === 'cn' ? 'px-3 py-1 text-xs font-bold rounded lang-btn-active' : 'px-3 py-1 text-xs font-bold rounded text-gray-400';
            renderVocab();
        }

        // --- RECORD LOGIC ---
        function saveRecord(s) {
            const records = JSON.parse(localStorage.getItem('topik_30days_records') || '[]');
            records.unshift({ day: currentDay, score: s, date: new Date().toLocaleString('ko-KR') });
            localStorage.setItem('topik_30days_records', JSON.stringify(records.slice(0, 30)));
        }

        function renderRecords() {
            const container = document.getElementById('records-container');
            const records = JSON.parse(localStorage.getItem('topik_30days_records') || '[]');
            if (records.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-400 py-12">아직 기록이 없습니다.</p>`;
                return;
            }
            container.innerHTML = records.map(r => `
                <div class="flex justify-between items-center p-4 bg-white rounded-2xl border border-gray-50">
                    <div>
                        <span class="text-[10px] font-bold text-blue-500 block">DAY ${r.day}</span>
                        <span class="text-xs text-gray-400">${r.date}</span>
                    </div>
                    <span class="font-black text-lg ${r.score >= 7 ? 'text-green-500' : 'text-red-400'}">${r.score}/10</span>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
