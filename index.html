<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOPIK Master AI - Study & Record</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .tab-active { border-bottom: 3px solid #3b82f6; color: #3b82f6; font-weight: 700; }
        .hidden { display: none; }
        .correct { background-color: #dcfce7; border-color: #22c55e; }
        .incorrect { background-color: #fee2e2; border-color: #ef4444; }
        .lang-btn-active { background-color: #3b82f6; color: white; border-color: #3b82f6; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        .quote-card { background: linear-gradient(135deg, #6366f1 0%, #3b82f6 100%); }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { border: 3px solid rgba(0,0,0,0.1); border-left-color: #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <!-- Header & Navigation -->
    <header class="bg-white shadow-sm sticky top-0 z-30">
        <div class="max-w-2xl mx-auto px-4 py-4 flex justify-between items-center">
            <button onclick="switchTab('home')" class="text-xl font-bold text-blue-600 flex items-center">
                <i class="fas fa-brain mr-2"></i>TOPIK AI Master
            </button>
            <div id="current-date" class="text-[10px] text-gray-400 font-bold"></div>
        </div>
        <nav class="flex border-t max-w-2xl mx-auto">
            <button onclick="switchTab('home')" id="tab-home" class="flex-1 px-4 py-3 text-center tab-active transition-all">홈</button>
            <button onclick="switchTab('quiz')" id="tab-quiz" class="flex-1 px-4 py-3 text-center text-gray-500 transition-all">AI 퀴즈</button>
            <button onclick="switchTab('vocab')" id="tab-vocab" class="flex-1 px-4 py-3 text-center text-gray-500 transition-all">AI 단어</button>
            <button onclick="switchTab('record')" id="tab-record" class="flex-1 px-4 py-3 text-center text-gray-500 transition-all">기록</button>
        </nav>
    </header>

    <main class="max-w-2xl mx-auto px-4 mt-6">
        <!-- HOME SECTION -->
        <section id="section-home" class="animate-fade-in">
            <div class="quote-card text-white p-8 rounded-3xl shadow-xl mb-8 relative overflow-hidden">
                <div class="relative z-10">
                    <i class="fas fa-quote-left text-3xl mb-4 opacity-50"></i>
                    <p id="daily-quote" class="text-xl font-bold leading-relaxed mb-6">AI와 함께하는 무한한 한국어 학습의 시작.</p>
                    <p id="daily-quote-author" class="text-blue-100 text-sm">- TOPIK Master Team</p>
                </div>
                <i class="fas fa-rocket absolute -bottom-4 -right-4 text-9xl opacity-10"></i>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm text-center">
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-1">총 학습 점수</p>
                    <p id="total-score-display" class="text-3xl font-black text-blue-600">0</p>
                </div>
                <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm text-center">
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-1">기록된 세션</p>
                    <p id="total-sessions-display" class="text-3xl font-black text-indigo-600">0</p>
                </div>
            </div>
            
            <button onclick="switchTab('quiz')" class="w-full mt-6 p-6 bg-blue-600 text-white rounded-2xl font-bold shadow-lg shadow-blue-100 flex items-center justify-center hover:bg-blue-700 transition-colors">
                <i class="fas fa-play-circle mr-3 text-2xl"></i>
                지금 바로 AI 퀴즈 시작하기
            </button>
        </section>

        <!-- QUIZ SECTION -->
        <section id="section-quiz" class="hidden animate-fade-in">
            <div id="quiz-loading" class="hidden bg-white p-12 rounded-3xl shadow-sm border text-center">
                <div class="spinner mx-auto mb-4"></div>
                <p class="text-gray-500 text-sm">AI가 새로운 문제를 생성 중입니다...</p>
            </div>

            <div id="quiz-content">
                <div class="bg-white p-6 rounded-3xl shadow-sm border mb-6">
                    <div class="flex justify-between items-center mb-6">
                        <span id="q-type" class="px-2 py-1 bg-blue-50 text-blue-600 text-[10px] font-black rounded uppercase">AI GENERATED</span>
                        <span id="quiz-score" class="text-sm font-bold text-blue-500">SCORE: 0</span>
                    </div>
                    <h3 id="q-text" class="text-lg font-medium text-gray-800 leading-relaxed mb-8">문제를 불러오고 있습니다.</h3>
                    <div id="options-box" class="space-y-3"></div>
                    
                    <div id="exp-box" class="mt-6 p-4 bg-indigo-50 rounded-xl border border-indigo-100 hidden animate-fade-in">
                        <p id="exp-text" class="text-sm text-indigo-800 leading-relaxed"></p>
                    </div>
                    
                    <button id="next-quiz-btn" onclick="generateNewQuiz()" class="w-full mt-8 py-4 bg-gray-900 text-white rounded-xl font-bold hidden hover:bg-black transition-all flex items-center justify-center">
                        <span>다음 문제 생성</span>
                        <i class="fas fa-magic ml-2"></i>
                    </button>
                </div>
            </div>
        </section>

        <!-- VOCAB SECTION -->
        <section id="section-vocab" class="hidden animate-fade-in">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-xl font-bold text-gray-800">AI 오늘의 단어</h2>
                    <p class="text-xs text-gray-400">매번 새로운 5개의 단어를 생성합니다.</p>
                </div>
                <div class="flex bg-gray-100 p-1 rounded-lg">
                    <button onclick="setLanguage('en')" id="lang-en" class="px-3 py-1 text-xs font-bold rounded lang-btn-active">EN</button>
                    <button onclick="setLanguage('cn')" id="lang-cn" class="px-3 py-1 text-xs font-bold rounded text-gray-400">CN</button>
                </div>
            </div>

            <div id="vocab-loading" class="hidden bg-white p-12 rounded-3xl shadow-sm border text-center">
                <div class="spinner mx-auto mb-4"></div>
                <p class="text-gray-500 text-sm">AI가 단어장을 구성하고 있습니다...</p>
            </div>

            <div id="vocab-list" class="space-y-4"></div>
            
            <button onclick="generateNewVocab()" class="w-full mt-8 py-4 bg-green-600 text-white rounded-xl font-bold hover:bg-green-700 transition-all shadow-lg shadow-green-100 flex items-center justify-center">
                <i class="fas fa-sync-alt mr-2"></i>
                새로운 단어장 생성
            </button>
        </section>

        <!-- RECORD SECTION -->
        <section id="section-record" class="hidden animate-fade-in">
            <div class="bg-white p-6 rounded-3xl shadow-sm border mb-6">
                <h2 class="text-xl font-bold text-gray-800 mb-2">학습 히스토리</h2>
                <p class="text-xs text-gray-400 mb-6">로컬 저장소에 저장된 최근 20개의 기록입니다.</p>
                <div id="records-container" class="space-y-3 text-sm"></div>
                <button onclick="clearRecords()" class="mt-8 text-xs text-red-400 font-bold hover:text-red-600 flex items-center mx-auto">
                    <i class="fas fa-trash-alt mr-1"></i> 모든 기록 삭제
                </button>
            </div>
        </section>
    </main>

    <script>
        const apiKey = ""; // 시스템에서 자동 제공
        let quizScore = 0;
        let totalScore = 0;
        let currentLang = 'en';
        let isQuizAnswered = false;

        window.onload = () => {
            const today = new Date();
            document.getElementById('current-date').innerText = today.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });
            updateHomeStats();
        };

        // --- 탭 전환 로직 ---
        function switchTab(tab) {
            ['home', 'quiz', 'vocab', 'record'].forEach(t => {
                document.getElementById(`section-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).className = "flex-1 px-4 py-3 text-center text-gray-500 transition-all";
            });
            document.getElementById(`section-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).className = "flex-1 px-4 py-3 text-center tab-active transition-all";

            if (tab === 'quiz') generateNewQuiz();
            if (tab === 'vocab') generateNewVocab();
            if (tab === 'record') renderRecords();
            if (tab === 'home') updateHomeStats();
        }

        // --- AI API 연동 (퀴즈) ---
        async function fetchAIContent(prompt) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Generate the requested content in JSON format." }, { text: prompt }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                const result = await response.json();
                return JSON.parse(result.candidates[0].content.parts[0].text);
            } catch (e) {
                console.error("AI Error:", e);
                return null;
            }
        }

        async function generateNewQuiz() {
            const loading = document.getElementById('quiz-loading');
            const content = document.getElementById('quiz-content');
            loading.classList.remove('hidden');
            content.classList.add('hidden');
            isQuizAnswered = false;
            document.getElementById('exp-box').classList.add('hidden');
            document.getElementById('next-quiz-btn').classList.add('hidden');

            const prompt = `Generate one TOPIK level 3-4 intermediate multiple choice question. 
            Include: "type" (Vocabulary/Grammar), "question" (with ( ) ), "options" (4 strings), "answerIndex" (0-3), "explanation" (in Korean).`;
            
            const data = await fetchAIContent(prompt);
            loading.classList.add('hidden');
            content.classList.remove('hidden');

            if (data) renderQuiz(data);
        }

        function renderQuiz(data) {
            document.getElementById('q-type').innerText = `CATEGORY: ${data.type}`;
            document.getElementById('q-text').innerText = data.question;
            const container = document.getElementById('options-box');
            container.innerHTML = '';
            data.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 rounded-xl border-2 border-gray-50 bg-white hover:border-blue-100 transition-all flex items-center";
                btn.innerHTML = `<div class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center font-bold mr-4 text-gray-300 text-xs">${idx + 1}</div><span class="text-sm font-medium text-gray-700">${opt}</span>`;
                btn.onclick = () => handleQuizAnswer(idx, data.answerIndex, data.explanation, btn);
                container.appendChild(btn);
            });
        }

        function handleQuizAnswer(selected, correct, exp, btn) {
            if (isQuizAnswered) return;
            isQuizAnswered = true;
            const allBtns = document.getElementById('options-box').children;
            if (selected === correct) {
                btn.classList.add('correct');
                quizScore += 10;
                saveScore(10);
            } else {
                btn.classList.add('incorrect');
                allBtns[correct].classList.add('correct');
            }
            document.getElementById('quiz-score').innerText = `SCORE: ${quizScore}`;
            document.getElementById('exp-text').innerText = exp;
            document.getElementById('exp-box').classList.remove('hidden');
            document.getElementById('next-quiz-btn').classList.remove('hidden');
        }

        // --- AI API 연동 (단어) ---
        async function generateNewVocab() {
            const loading = document.getElementById('vocab-loading');
            const list = document.getElementById('vocab-list');
            loading.classList.remove('hidden');
            list.innerHTML = '';

            const prompt = `Generate 5 essential TOPIK intermediate words. 
            Return an array "words" containing objects: "word", "pos", "meanEn", "meanCn", "example".`;
            
            const data = await fetchAIContent(prompt);
            loading.classList.add('hidden');
            
            if (data && data.words) {
                list.innerHTML = data.words.map((v, i) => `
                    <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm animate-fade-in" style="animation-delay: ${i * 0.1}s">
                        <div class="flex justify-between items-start mb-2">
                            <h4 class="font-bold text-lg text-gray-800">${v.word}</h4>
                            <span class="text-[10px] px-2 py-0.5 bg-green-50 text-green-600 rounded-full font-bold uppercase">${v.pos}</span>
                        </div>
                        <p class="text-blue-600 font-medium text-sm mb-3">${currentLang === 'en' ? v.meanEn : v.meanCn}</p>
                        <div class="text-xs text-gray-400 bg-gray-50 p-3 rounded-lg border border-gray-100 italic">" ${v.example} "</div>
                    </div>
                `).join('');
            }
        }

        function setLanguage(l) {
            currentLang = l;
            document.getElementById('lang-en').className = l === 'en' ? 'px-3 py-1 text-xs font-bold rounded lang-btn-active' : 'px-3 py-1 text-xs font-bold rounded text-gray-400';
            document.getElementById('lang-cn').className = l === 'cn' ? 'px-3 py-1 text-xs font-bold rounded lang-btn-active' : 'px-3 py-1 text-xs font-bold rounded text-gray-400';
            generateNewVocab();
        }

        // --- 기록 저장 및 관리 ---
        function saveScore(s) {
            const records = JSON.parse(localStorage.getItem('topik_ai_records') || '[]');
            records.unshift({ date: new Date().toLocaleString('ko-KR'), score: s });
            localStorage.setItem('topik_ai_records', JSON.stringify(records.slice(0, 20)));
            updateHomeStats();
        }

        function renderRecords() {
            const container = document.getElementById('records-container');
            const records = JSON.parse(localStorage.getItem('topik_ai_records') || '[]');
            if (records.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-400 py-12">아직 기록이 없습니다. 퀴즈를 풀어보세요!</p>`;
                return;
            }
            container.innerHTML = records.map(r => `
                <div class="flex justify-between items-center p-4 bg-gray-50 rounded-xl border border-gray-100">
                    <span class="text-gray-400 text-[10px]">${r.date}</span>
                    <span class="font-black text-blue-600">+${r.score}</span>
                </div>
            `).join('');
        }

        function clearRecords() {
            if (confirm("정말 모든 학습 기록을 삭제하시겠습니까?")) {
                localStorage.removeItem('topik_ai_records');
                renderRecords();
                updateHomeStats();
            }
        }

        function updateHomeStats() {
            const records = JSON.parse(localStorage.getItem('topik_ai_records') || '[]');
            const total = records.reduce((sum, r) => sum + r.score, 0);
            document.getElementById('total-score-display').innerText = total;
            document.getElementById('total-sessions-display').innerText = records.length;
        }
    </script>
</body>
</html>
